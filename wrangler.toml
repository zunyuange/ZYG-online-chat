name = "zyg-online-chat"
main = "src/server/index.worker.ts"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]
# 显式启用 workers.dev 子域名（配置 [[routes]] 后默认关闭）
workers_dev = true

[assets]
directory = "./dist"
binding = "ASSETS"
# 所有请求先经过 Worker 处理（API 路由自己响应，静态资源通过 env.ASSETS.fetch() 获取）
run_worker_first = true

# ===== 路由配置（🆕 自定义域名支持）=====
# 平台主域名
[[routes]]
pattern = "zygonlinechat.zygmail.icu"
zone_name = "zygmail.icu"

# 🔧 三级子域名通配符（覆盖所有商家）
# ⚠️ 注意：如果你希望每个商家的三级域名作为独立的「Workers 自定义域」
#   出现在 Cloudflare Dashboard → Workers → Settings → Domains & Routes 中，
#   需要：
#   1. 注释掉下面这行通配符路由
#   2. 配置 CF_API_TOKEN / CF_ACCOUNT_ID / CF_ZONE_ID
#   3. 运行 scripts/register-workers-domains.ts 注册已有域名
#   4. 新建商家时将自动注册 Workers 自定义域
#   详细说明见 docs/PLAN_CUSTOM_DOMAIN.md
[[routes]]
pattern = "*.zygonlinechat.zygmail.icu"
zone_name = "zygmail.icu"

# ⚠️ workers.dev 域名由 Cloudflare 自动路由，无需在此配置 [[routes]]
# 添加路由反而会导致 "Some triggers failed to deploy" 错误

# Environment variables
[vars]
BARK_API = "https://api.day.app"
# Auth: Require login for staff panel
REQUIRE_AUTH = "true"
# 🆕 Token encryption key (AES-GCM, 32 chars recommended)
# ⚠️ 生产环境建议通过 wrangler secret put ENCRYPTION_KEY 设置
ENCRYPTION_KEY = "dev-encryption-key-change-in-production"
# 🆕 Cloudflare 平台级配置（用于 Workers 自定义域自动注册）
# 从 Cloudflare Dashboard → 我的个人资料 → API 令牌 创建 Token（需要 Workers:Edit + Zone:Read 权限）
# ⚠️ 生产环境建议通过 wrangler secret put CF_API_TOKEN 设置
# CF_ACCOUNT_ID: Cloudflare 账号 ID (Dashboard → Workers & Pages → 右侧栏)
# CF_ZONE_ID: zygmail.icu 的 Zone ID (Dashboard → zygmail.icu → 概述 → API 区域)
CF_API_TOKEN = ""
CF_ACCOUNT_ID = ""
CF_ZONE_ID = ""

[[d1_databases]]
binding = "DB"
database_name = "zyg-online-chat-db"
database_id = "91fad6d8-e535-4bc0-95fc-2b69c32c7d22"

# R2 bucket for file uploads
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "zyg-online-chat-uploads"

[build]
command = "npm run build:worker"

[env.production]
name = "zyg-online-chat"

[env.production.vars]
BARK_API = "https://api.day.app"
REQUIRE_AUTH = "true"
# ⚠️ 生产环境强烈建议使用 wrangler secret put ENCRYPTION_KEY 而非明文配置
ENCRYPTION_KEY = "prod-placeholder-change-via-secret"
# 🆕 生产环境 Cloudflare 平台配置
CF_API_TOKEN = ""
CF_ACCOUNT_ID = ""
CF_ZONE_ID = ""

[[env.production.d1_databases]]
binding = "DB"
database_name = "zyg-online-chat-db"
database_id = "91fad6d8-e535-4bc0-95fc-2b69c32c7d22"

[ai]
binding = "AI"

[[env.production.r2_buckets]]
binding = "BUCKET"
bucket_name = "zyg-online-chat-uploads"

[env.production.ai]
binding = "AI"

# 🆕 生产环境路由配置
[[env.production.routes]]
pattern = "zygonlinechat.zygmail.icu"
zone_name = "zygmail.icu"

# 🔧 生产环境通配符路由（参见上方注释说明）
[[env.production.routes]]
pattern = "*.zygonlinechat.zygmail.icu"
zone_name = "zygmail.icu"

# ⚠️ workers.dev 域名由 Cloudflare 自动路由，无需在此配置 [[routes]]
# workers.dev 子域名：https://zyg-online-chat.linzihai.workers.dev 自动可用
